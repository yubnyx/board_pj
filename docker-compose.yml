services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - ./backend/.env
    # MYSQL_ROOT_PASSWORD, MYSQL_DATABASE 는 backend/.env 에서 읽어옵니다
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
  chroma_data:
